name: Generate Mibao Family Contributions

on:
  schedule:
    # 每小时第 7 分钟运行，避开整点拥堵
    - cron: '7 * * * *'
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [ main ]

concurrency:
  group: mibao-family-stats
  cancel-in-progress: true

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests Pillow
        
    - name: Generate contribution stats
      env:
        GITHUB_TOKEN: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}
        AUTHOR_EMAILS: Mibao0211@163.com,1063037668@qq.com
        STATS_TIMEZONE: Asia/Shanghai
      run: python scripts/generate_stats.py
      
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git diff --staged --quiet || (git commit -m "Update Mibao Family contribution stats [$(date +%Y-%m-%d)]")
        git pull --rebase origin main
        git push
